# git-cliff configuration — drives the changelog from Conventional Commits.
#
# Spec: docs/04-cicd.md ("Release automation" → Changelog | git-cliff | Driven
# by Conventional Commits; keeps CHANGELOG.md). The release pipeline
# (.github/workflows/release.yml) runs `git-cliff --latest` to produce the
# GitHub Release notes; `git-cliff` with no args regenerates the full
# CHANGELOG.md locally.
#
# Commit types are kept in sync with .github/workflows/pr-title.yml (the
# Conventional-Commit allow-list) — `main` is squash-merge, so every commit
# subject is a former PR title and is guaranteed to parse here.

[changelog]
header = """
# Changelog

All notable changes to Stele are documented here. The format follows
[Keep a Changelog](https://keepachangelog.com) and the project adheres to
[Semantic Versioning](https://semver.org).\n
"""
# Tera template: one section per release, commits grouped by type.
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}*{{ commit.scope }}*: {% endif %}\
{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
# Subsystem groupings, highest-signal first. Anything that doesn't match a
# rule is dropped (filter_commits below keeps the changelog focused on
# user-facing change).
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Refactor" },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  { message = "^test", group = "<!-- 5 -->Testing" },
  { message = "^build", group = "<!-- 6 -->Build System" },
  { message = "^ci", group = "<!-- 7 -->CI/CD" },
  { message = "^chore|^style|^revert", skip = true },
  { message = ".*", skip = true },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "oldest"
