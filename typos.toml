# Config for `crate-ci/typos`.
# Run locally with `typos` (or `cargo install --locked --version 1.39.0 typos-cli`).
#
# Keep this list small and well-justified: every entry is a class of word we are
# telling typos to stop flagging. Prefer fixing the word over adding it here.

[default]
# Honor .gitignore, never scan generated artifacts.
extend-ignore-re = []

[default.extend-words]
# Compound-word prefix "mis-" (e.g., "mis-order", "mis-closes", "mis-scopes")
# is correct English meaning "wrongly". typos splits on the hyphen and tries
# to correct the bare token "mis" to "miss" / "mist".
mis = "mis"

# Company name (HashiCorp). typos sees the leading "Hashi" stem and tries to
# shorten it to "Hash". The full word would be allowed too but the stem is
# what triggers; whitelisting the stem is sufficient.
Hashi = "Hashi"

[files]
# Don't scan vendored or generated output. (Cargo.lock is regenerated; binary
# artifacts under target/ are already excluded by .gitignore.)
extend-exclude = ["Cargo.lock", "target/"]
