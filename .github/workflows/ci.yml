# CI quick + test gate — runs on every PR and on push to main.
# Spec: docs/04-cicd.md (the "required status checks" table is the source of truth).
#
# Action references below use tag form for readability while the workflow is
# under development; once the file stabilizes they will be pinned to commit
# SHAs ([ADR-0005] reproducibility). Tracked as a v0.1 follow-up ticket.
name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

jobs:
  quick:
    name: quick (fmt · clippy · typos)
    runs-on: arc-runner-fricker-amd64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      # `crate-ci/typos@master` downloads via `wget`, which isn't on this
      # self-hosted runner. Install from crates.io instead — the Rust toolchain
      # is already in place, so no extra system dependency is needed.
      #
      # Pinned to 1.39.0 because newer typos-cli (>=1.40) requires rustc >= 1.91
      # while our MSRV is 1.85. Bump alongside the MSRV (tracked in STL-84).
      - run: cargo install --locked --version 1.39.0 typos-cli
      - run: typos

  test:
    name: test (${{ matrix.target }})
    needs: quick
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: arc-runner-fricker-amd64, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest,  target: aarch64-apple-darwin }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --all-features
      - run: cargo test --doc --workspace --all-features

  msrv:
    name: msrv (1.85.0)
    needs: quick
    runs-on: arc-runner-fricker-amd64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-features --locked

  docs:
    name: docs build
    needs: quick
    runs-on: arc-runner-fricker-amd64
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features

  supply-chain:
    name: cargo-deny
    needs: quick
    runs-on: arc-runner-fricker-amd64
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
