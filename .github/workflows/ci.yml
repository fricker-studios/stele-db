# CI quick + test gate — runs on every PR and on push to main.
# Spec: docs/04-cicd.md (the "required status checks" table is the source of truth).
#
# All `uses:` references are pinned to a 40-char commit SHA per ADR-0005
# (reproducible builds). Dependabot proposes SHA bumps as normal PRs; keep the
# trailing `# vX.Y.Z` comment in sync when accepting them.
#
# dtolnay/rust-toolchain has no version tags upstream — when pinning by SHA the
# `toolchain:` input must be set explicitly (the action otherwise infers it
# from the ref name, which is the SHA when pinned).
#
# `toolchain:` is pinned to 1.89.0 (== rust-toolchain.toml) on every job, not
# `stable`. rust-toolchain.toml already overrides the build to 1.89.0, so
# installing `stable` only ever downloaded a toolchain we never used — pure waste
# over the self-hosted runners' WAN. Pinning to the MSRV makes the install a no-op
# once the runner image (images/gh-runner/Dockerfile in the homelab repo) bakes
# the same toolchain; until it is rebuilt past 1.85.0 the action just downloads
# 1.89.0. Bump in lockstep with rust-toolchain.toml on an MSRV move.
name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN: every job in this workflow only reads the
# repo (clone, cargo build/test/lint/doc, cargo-deny). Setting it here so
# the workflow doesn't inherit a write-default if the repo/org default
# changes, and so the intent is documented locally (STL-114).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

jobs:
  quick:
    name: quick (fmt · clippy · typos)
    runs-on: arc-runner-fricker-amd64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags)
        with:
          toolchain: "1.89.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - run: cargo fmt --all -- --check
      # `stele-exec-oracle` is excluded: linting its tests would compile the
      # bundled DuckDB amalgamation (minutes). It is built only in the nightly
      # `duckdb-oracle` job (STL-158).
      - run: cargo clippy --workspace --exclude stele-exec-oracle --all-targets --all-features -- -D warnings
      # `crate-ci/typos@master` downloads via `wget`, which isn't on this
      # self-hosted runner. Install from crates.io instead — the Rust toolchain
      # is already in place, so no extra system dependency is needed.
      #
      # Pinned to 1.39.0 because newer typos-cli (>=1.40) requires rustc >= 1.91
      # while our MSRV is 1.89. Bump alongside the MSRV.
      - run: cargo install --locked --version 1.39.0 typos-cli
      - run: typos

  test:
    name: test (${{ matrix.target }})
    needs: quick
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: arc-runner-fricker-amd64, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest,  target: aarch64-apple-darwin }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags)
        with:
          toolchain: "1.89.0"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: nextest
      # `stele-exec-oracle` (the DuckDB differential oracle) is excluded from the
      # per-PR test run — its bundled-amalgamation compile runs only in the
      # nightly `duckdb-oracle` job (STL-158). Per-PR temporal coverage still
      # comes from the in-process oracles (STL-111, STL-138).
      - run: cargo nextest run --workspace --exclude stele-exec-oracle --all-features
      - run: cargo test --doc --workspace --exclude stele-exec-oracle --all-features

  # Windows portability gate (STL-160). A dedicated job rather than a `test`
  # matrix row: Windows is tier-3 best-effort (docs/04-cicd.md), and the
  # storage backend is the only place platform file semantics actually diverge
  # (`O_APPEND`+`pread` vs `FILE_APPEND_DATA`+`seek_read`) — so this compiles
  # the whole workspace (tests included) and runs the storage suite, without
  # putting the full test gate's runtime on the slowest hosted runner.
  # GitHub-hosted: the self-hosted ARC pool is Linux-only (same reasoning as
  # release.yml's matrix).
  windows:
    name: windows (build + storage tests)
    needs: quick
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags)
        with:
          toolchain: "1.89.0"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: nextest
      # `--all-targets` proves every test/bench target compiles on Windows, not
      # just the shipped binaries; `stele-exec-oracle` is excluded for the same
      # reason as everywhere else (bundled DuckDB amalgamation, STL-158).
      - run: cargo build --workspace --exclude stele-exec-oracle --all-targets --all-features --locked
      # The platform-divergent surface: the backend conformance suite pins the
      # append-cursor invariant (positioned reads never move it) on NTFS.
      - run: cargo nextest run -p stele-storage --all-features

  msrv:
    name: msrv (1.89.0)
    needs: quick
    runs-on: arc-runner-fricker-amd64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags)
        with:
          toolchain: "1.89.0"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - run: cargo build --workspace --all-features --locked

  docs:
    name: docs build
    needs: quick
    runs-on: arc-runner-fricker-amd64
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags)
        with:
          toolchain: "1.89.0"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - run: cargo doc --workspace --no-deps --all-features

  supply-chain:
    name: cargo-deny
    needs: quick
    runs-on: arc-runner-fricker-amd64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20

  five-minute-path:
    name: five-minute path (docker identity demo)
    needs: quick
    # GitHub-hosted: the Docker daemon and the postgresql-client (`psql`) the
    # smoke test needs are both preinstalled. The self-hosted ARC runners are
    # unprivileged k8s pods with no Docker daemon, so the image build/run lives
    # here (same place codeql.yml runs). Only the SHA-pinned actions/checkout is
    # used; everything else is the runner's stock `docker` CLI (ADR-0005 keeps
    # the third-party action surface small).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build the canonical image
        run: docker build -f docker/Dockerfile -t stele:ci .
      - name: Start the engine
        run: docker run -d --name stele -p 5454:5454 stele:ci --dev
      - name: Run the identity demo and assert the AS OF query time-travels
        run: ci/identity-demo-smoke.sh localhost 5454
      - name: Run the valid-time demo and assert FOR VALID_TIME AS OF resolves
        run: ci/valid-time-demo-smoke.sh localhost 5454
      # The v0.2 driver exit gate (STL-184): real Postgres drivers run a
      # parameterized prepared query against the same running container. The
      # venv dodges the runner image's externally-managed system Python
      # (PEP 668); java + python3 are both preinstalled on ubuntu-latest. The
      # driver versions are pinned — psycopg here, pgjdbc (jar + SHA-256) in
      # ci/jdbc-smoke.sh — and documented in docs/04-cicd.md.
      - name: Driver gate — psycopg runs a parameterized prepared query
        run: |
          python3 -m venv /tmp/psycopg-venv
          /tmp/psycopg-venv/bin/pip install --quiet "psycopg[binary]==3.3.4"
          /tmp/psycopg-venv/bin/python ci/psycopg-smoke.py localhost 5454
      - name: Driver gate — JDBC (pgjdbc) runs a parameterized prepared query
        run: ci/jdbc-smoke.sh localhost 5454
      # The TLS leg (STL-251): a second container boots NON-dev from a config
      # file with `[tls] mode = "required"` and a self-signed cert minted on
      # the runner. psql, psycopg, and pgjdbc each connect with
      # sslmode=require and run a query; a plaintext attempt must be refused
      # with the FATAL the server emits (SQLSTATE 28000).
      - name: Start a TLS-required engine from a config file
        run: |
          mkdir -p /tmp/stele-tls
          openssl req -x509 -newkey rsa:2048 -sha256 -days 2 -nodes \
            -keyout /tmp/stele-tls/server.key -out /tmp/stele-tls/server.crt \
            -subj "/CN=localhost" \
            -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"
          chmod 644 /tmp/stele-tls/server.key
          cat > /tmp/stele-tls/stele.toml <<'CONF'
          [server]
          listen = "0.0.0.0:5454"
          data_dir = "/var/lib/stele"
          [tls]
          mode = "required"
          cert = "/etc/stele/server.crt"
          key  = "/etc/stele/server.key"
          CONF
          # No --dev: the image's default CMD reads /etc/stele/stele.toml.
          docker run -d --name stele-tls -p 5455:5454 \
            -v /tmp/stele-tls:/etc/stele:ro stele:ci
      - name: Driver gate (TLS) — psql connects with sslmode=require
        run: |
          CONN="host=localhost port=5455 user=stele dbname=stele sslmode=require"
          for _ in $(seq 1 30); do
            psql "$CONN" -c "SELECT 1" >/dev/null 2>&1 && break
            sleep 1
          done
          psql "$CONN" -tA -c "SELECT 1" | grep -qx 1
      - name: Driver gate (TLS) — plaintext is refused while TLS is required
        run: |
          set +e
          OUT=$(psql "host=localhost port=5455 user=stele dbname=stele sslmode=disable" \
            -c "SELECT 1" 2>&1)
          STATUS=$?
          set -e
          echo "$OUT"
          test "$STATUS" -ne 0
          echo "$OUT" | grep -q "requires TLS"
      - name: Driver gate (TLS) — psycopg connects with sslmode=require
        run: /tmp/psycopg-venv/bin/python ci/psycopg-smoke.py localhost 5455 require
      - name: Driver gate (TLS) — pgjdbc connects with sslmode=require
        run: ci/jdbc-smoke.sh localhost 5455 require
      # The SCRAM leg (STL-252): the documented operator bootstrap, run for
      # real. A seed container boots TLS-required + trust on a fresh data
      # volume and CREATE USERs the CI principal; a second container boots the
      # SAME volume with [auth] (scram) — proving verifiers survive a restart —
      # and psql, psycopg, and pgjdbc each authenticate via SCRAM-SHA-256. A
      # wrong password must be refused with the 28P01 FATAL.
      - name: Bootstrap a SCRAM user store (trust boot → CREATE USER → restart)
        run: |
          mkdir -p /tmp/stele-auth
          cp /tmp/stele-tls/server.crt /tmp/stele-tls/server.key /tmp/stele-auth/
          cat > /tmp/stele-auth/stele.toml <<'CONF'
          [server]
          listen = "0.0.0.0:5454"
          data_dir = "/var/lib/stele"
          [tls]
          mode = "required"
          cert = "/etc/stele/server.crt"
          key  = "/etc/stele/server.key"
          CONF
          docker volume create stele-auth-data
          docker run -d --name stele-auth-seed -p 5456:5454 \
            -v /tmp/stele-auth:/etc/stele:ro \
            -v stele-auth-data:/var/lib/stele stele:ci
          CONN="host=localhost port=5456 user=stele dbname=stele sslmode=require"
          for _ in $(seq 1 30); do
            psql "$CONN" -c "SELECT 1" >/dev/null 2>&1 && break
            sleep 1
          done
          psql "$CONN" -c "CREATE USER ci PASSWORD 'ci-s3cret'"
          docker rm -f stele-auth-seed
          cat >> /tmp/stele-auth/stele.toml <<'CONF'
          [auth]
          mode = "scram"
          CONF
          docker run -d --name stele-auth -p 5456:5454 \
            -v /tmp/stele-auth:/etc/stele:ro \
            -v stele-auth-data:/var/lib/stele stele:ci
      - name: Driver gate (SCRAM) — psql authenticates via SCRAM-SHA-256
        run: |
          CONN="host=localhost port=5456 user=ci dbname=stele sslmode=require"
          for _ in $(seq 1 30); do
            PGPASSWORD=ci-s3cret psql "$CONN" -c "SELECT 1" >/dev/null 2>&1 && break
            sleep 1
          done
          PGPASSWORD=ci-s3cret psql "$CONN" -tA -c "SELECT 1" | grep -qx 1
      - name: Driver gate (SCRAM) — a wrong password is refused with 28P01
        run: |
          set +e
          OUT=$(PGPASSWORD=wrong psql \
            "host=localhost port=5456 user=ci dbname=stele sslmode=require" \
            -c "SELECT 1" 2>&1)
          STATUS=$?
          set -e
          echo "$OUT"
          test "$STATUS" -ne 0
          echo "$OUT" | grep -q "password authentication failed"
      - name: Driver gate (SCRAM) — psycopg authenticates via SCRAM-SHA-256
        run: /tmp/psycopg-venv/bin/python ci/psycopg-smoke.py localhost 5456 require ci ci-s3cret
      - name: Driver gate (SCRAM) — pgjdbc authenticates via SCRAM-SHA-256
        run: ci/jdbc-smoke.sh localhost 5456 require ci ci-s3cret
      - name: Engine logs
        if: always()
        run: |
          docker logs stele || true
          docker logs stele-tls || true
          docker logs stele-auth || true
      - name: Stop the engine
        if: always()
        run: |
          docker rm -f stele || true
          docker rm -f stele-tls || true
          docker rm -f stele-auth || true
          docker volume rm stele-auth-data || true
