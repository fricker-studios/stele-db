# Tag-driven release pipeline.
#
# Spec: docs/04-cicd.md ("Release automation"). Pushing an annotated, signed
# tag `vX.Y.Z` is the *only* way to cut a release — there are no manual steps.
# The flow mirrors the doc's release diagram:
#
#   gate ─┬─ binaries ─┐
#         ├─ docker ───┼─ release (sign + GitHub Release)
#         └─ changelog ┘
#
# Nothing publishes until `gate` (the full test gate) is green on the tagged
# commit, so a tag can never ship a build that wouldn't have merged.
#
# Runners: unlike the per-PR workflows, every job here runs on GitHub-hosted
# runners (free for this public repo). A release must not depend on the
# homelab ARC pods being up, needs macOS/Windows cross-targets the ARC pool
# can't provide, and needs network egress to ghcr.io + Sigstore that the
# unprivileged ARC pods lack (same reasoning as ci.yml's docker job).
#
# All `uses:` are pinned to a 40-char commit SHA per ADR-0005 (reproducible
# builds); the trailing `# vX.Y.Z` is kept in sync when Dependabot bumps them.
name: release

on:
  push:
    tags: ["v*.*.*"]

# A release is never safe to cancel mid-publish (half-pushed image, partial
# GitHub Release). Serialize per tag and let an in-flight run finish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Default to read-only; jobs that publish elevate locally (least privilege).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Re-run the test gate on the tagged commit and assert the workspace version
  # matches the tag — a tag is a promise, so verify it before building anything.
  gate:
    name: gate (version + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # need the tag object itself to check it's annotated
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags)
        with:
          toolchain: "1.89.0"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: nextest
      - name: Tag is annotated and matches the workspace version
        run: |
          # Releases are cut only from annotated tags (docs/04-cicd.md), which
          # carry a tagger + message and are what `git tag -s` signs. A
          # lightweight tag points straight at a commit, so `cat-file -t` is
          # `commit` rather than `tag` — reject it before anything publishes.
          if [ "$(git cat-file -t "${GITHUB_REF_NAME}")" != "tag" ]; then
            echo "::error::${GITHUB_REF_NAME} is a lightweight tag; cut releases from an annotated, signed tag (git tag -s ${GITHUB_REF_NAME})"
            exit 1
          fi
          # First `version =` in Cargo.toml is [workspace.package].version,
          # which every crate inherits. The tag must be exactly v<that>.
          crate_ver="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          expected="v${crate_ver}"
          if [ "${GITHUB_REF_NAME}" != "${expected}" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} != workspace version ${expected} (bump Cargo.toml or fix the tag)"
            exit 1
          fi
          echo "tag ${GITHUB_REF_NAME} is annotated and matches workspace version ✓"
      - run: cargo nextest run --workspace --all-features --locked
      - run: cargo test --doc --workspace --all-features --locked

  # Generate the release notes (this tag's section only) for the GitHub Release.
  changelog:
    name: changelog
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # git-cliff needs full history + tags
      - name: Generate release notes with git-cliff
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: changelog
          path: RELEASE_NOTES.md
          if-no-files-found: error

  # Per-target release binaries (the doc's tier-1/2/3 matrix). Each job builds
  # the two shipping binaries, archives them, and uploads the archive; the
  # `release` job collects every archive and computes one signed checksum file.
  binaries:
    name: binaries (${{ matrix.target }})
    needs: gate
    strategy:
      fail-fast: false
      matrix:
        include:
          # Tier 1
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, ext: "" }
          - { os: macos-latest, target: aarch64-apple-darwin, ext: "" }
          # Tier 2
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, ext: "", linker: gcc-aarch64-linux-gnu }
          # `macos-15-intel`, not the retired `macos-13`: GitHub removed the
          # macOS 13 (Intel) image under its N-1 OS policy (~Dec 2025), so a
          # `macos-13` job hangs `queued` forever with no runner. macos-15-intel
          # is the last Intel-based hosted image (until ~Fall 2027); after that
          # GitHub drops hosted Intel macOS entirely and this target retires
          # (STL-161).
          - { os: macos-15-intel, target: x86_64-apple-darwin, ext: "" }
          # Tier 3 — restored by STL-160 (portable seek_read storage backend).
          # Unlike v0.1 this is no longer a release-only target: ci.yml's
          # `windows` job builds the workspace + runs the storage suite on
          # every PR, so a tag can't be the first time Windows compiles.
          - { os: windows-latest, target: x86_64-pc-windows-msvc, ext: ".exe" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags)
        with:
          toolchain: "1.89.0"
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          key: ${{ matrix.target }}
      - name: Install cross linker
        if: matrix.linker != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.linker }}
      - name: Build release binaries
        shell: bash
        # The aarch64-linux build cross-links with the gcc installed above; the
        # env var is inert for the native targets (cargo only reads the var
        # matching the active target triple).
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --locked --target ${{ matrix.target }} \
            -p stele-server -p stele-cli
      - name: Package archive
        shell: bash
        env:
          EXT: ${{ matrix.ext }}
        run: |
          ver="${GITHUB_REF_NAME}"
          target="${{ matrix.target }}"
          bindir="target/${target}/release"
          staging="stele-${ver}-${target}"
          mkdir "${staging}"
          cp "${bindir}/stele-server${EXT}" "${bindir}/stele${EXT}" "${staging}/"
          cp README.md LICENSE "${staging}/"
          tar czf "${staging}.tar.gz" "${staging}"
          echo "ARCHIVE=${staging}.tar.gz" >> "${GITHUB_ENV}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  # Multi-arch image → ghcr.io/<owner>/stele, signed by digest with cosign.
  docker:
    name: docker (ghcr.io)
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to ghcr.io + the provenance attestation
      id-token: write # keyless cosign signing + Sigstore-signed provenance
      attestations: write # record SLSA provenance in the GitHub attestation store
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/stele
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        # Pin the cosign *binary* version, not just the SHA-pinned installer
        # action (ADR-0005). Left unpinned it floats to latest — cosign v3
        # changed `sign-blob` (bundle-by-default) and broke the v2-style
        # `--output-signature`/`--output-certificate` invocation below. v2.6.3
        # is the latest v2; keep both cosign steps on it (STL-190).
        with:
          cosign-release: "v2.6.3"
      - name: Sign the image by digest
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/stele
          DIGEST: ${{ steps.build.outputs.digest }}
        # Sign the immutable digest, not a tag — this covers every tag that
        # points at it (v{{version}}, {{major}}.{{minor}}, latest).
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
      # SLSA build provenance for the image (docs/04-cicd.md → Signing). We
      # attest the digest with actions/attest-build-provenance rather than
      # buildx `provenance: true`: buildx attaches the provenance to the image
      # index, which changes the manifest some older clients choke on for
      # multi-arch pulls. attest-build-provenance pushes a *separate* OCI
      # artifact referenced by the same digest, so a plain `docker pull` is
      # untouched while `cosign verify-attestation` / `gh attestation verify`
      # can still resolve the provenance. push-to-registry stores it next to
      # the image in ghcr.io.
      - name: Attest SLSA build provenance for the image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/stele
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # Assemble the GitHub Release: checksums (cosign-signed), SBOM, per-target
  # binaries, and the git-cliff notes.
  release:
    name: release (sign + publish)
    needs: [gate, changelog, binaries, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # keyless cosign signing + Sigstore-signed provenance
      attestations: write # record SLSA provenance in the GitHub attestation store
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags)
        with:
          toolchain: "1.89.0"
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          # cargo-cyclonedx emits the per-crate BOMs; cyclonedx (CycloneDX CLI)
          # merges them into one workspace document (STL-156).
          tool: cargo-cyclonedx,cyclonedx
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: Stage release files
        run: |
          mkdir -p dist
          # Each binary-<target> artifact downloads into its own subdir.
          find artifacts -name '*.tar.gz' -exec cp {} dist/ \;
          cp artifacts/changelog/RELEASE_NOTES.md RELEASE_NOTES.md
      - name: Generate merged CycloneDX SBOM
        # cargo-cyclonedx (prebuilt above — no compile, so no MSRV coupling)
        # emits one <crate>.cdx.json per workspace member. Those fragments are
        # then folded into a single canonical workspace BOM with the CycloneDX
        # CLI so downstream SCA tooling consumes one document (STL-156). A flat
        # merge deduplicates shared dependencies; --name/--version stamp the
        # top-level metadata.component as the workspace at this tag.
        run: |
          cargo cyclonedx --format json
          # Deterministic input ordering keeps the merged BOM byte-stable across
          # reruns of the same tag (matters for the signed checksum below).
          mapfile -t boms < <(find . -name '*.cdx.json' -not -path './target/*' | sort)
          cyclonedx merge \
            --input-files "${boms[@]}" \
            --output-file "dist/stele-${GITHUB_REF_NAME}.cdx.json" \
            --output-format json \
            --name stele \
            --version "${GITHUB_REF_NAME#v}"
      - name: Compute checksums
        working-directory: dist
        # Sum the binary archives and the merged SBOM; SHA256SUMS (and later its
        # .sig/.pem) stay out. The SBOM is integrity-covered like every asset.
        run: sha256sum *.tar.gz *.cdx.json > SHA256SUMS
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        # Pin cosign to v2.6.3 — see the docker job above. v3's `sign-blob`
        # bundle-by-default broke this `--output-signature`/`--output-certificate`
        # invocation ("create bundle file: open : no such file or directory").
        with:
          cosign-release: "v2.6.3"
      - name: Sign the checksum file (keyless)
        working-directory: dist
        run: |
          cosign sign-blob --yes SHA256SUMS \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.pem
      # SLSA build provenance for the per-target archives (docs/04-cicd.md →
      # Signing). subject-checksums reads the (digest, name) pairs straight out
      # of SHA256SUMS, so one call attests every archive without re-hashing —
      # the same file the cosign sign-blob above already covers. A downloaded
      # archive then verifies by its own digest with
      # `gh attestation verify <archive> --repo <owner>/stele` (or
      # `cosign verify-attestation`), no path-matching needed.
      - name: Attest SLSA build provenance for the binaries
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-checksums: dist/SHA256SUMS
      - name: Create or update the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Pre-1.0 tags ship as prereleases (the API is still stabilizing).
        # Idempotent: a rerun after a transient failure updates the existing
        # release and re-uploads assets (--clobber) instead of erroring.
        run: |
          prerelease="false"
          case "${GITHUB_REF_NAME}" in
            v0.*) prerelease="true" ;;
          esac
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file RELEASE_NOTES.md \
              --prerelease="${prerelease}"
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file RELEASE_NOTES.md \
              --prerelease="${prerelease}" \
              dist/*
          fi
