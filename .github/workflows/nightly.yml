# Nightly + labeled deep gate.
# Spec: docs/04-cicd.md "Scheduled / labeled (deep) checks".
#
# These jobs are placeholders matching the documented intent. Each becomes a
# real ticket as the relevant subsystem lands:
#   * sanitizers   — needs the storage core compiling under -Zsanitizer
#   * miri         — needs unsafe-bearing crates to exist
#   * fuzz         — needs cargo-fuzz targets
#   * simulation   — needs stele-sim scenarios registered
#   * bench-gate   — needs criterion benchmarks committed
#
# The jobs are wired so PRs can opt in by adding the `full-ci` label, and the
# scheduled run keeps a nightly heartbeat once any of them have real work.
#
# All `uses:` references are pinned to a 40-char commit SHA per ADR-0005
# (reproducible builds). See .github/workflows/ci.yml for the SHA rationale —
# Dependabot proposes bumps, the trailing `# vX.Y.Z` comment stays in sync.
name: nightly

on:
  schedule:
    - cron: "0 6 * * *"
  pull_request:
    types: [labeled]

# Least-privilege GITHUB_TOKEN: sanitizers / miri / fuzz / sim / bench-gate
# are all read-only against the repo. Pinned locally so the workflow doesn't
# inherit a write-default if the repo/org default changes (STL-114).
permissions:
  contents: read

jobs:
  sanitizers:
    if: github.event_name == 'schedule' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    runs-on: arc-runner-fricker-amd64
    strategy:
      fail-fast: false
      matrix:
        san: [address, thread, leak]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags)
        with:
          toolchain: nightly
          components: rust-src
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: nextest under sanitizer
        env:
          RUSTFLAGS: "-Zsanitizer=${{ matrix.san }}"
          RUSTDOCFLAGS: "-Zsanitizer=${{ matrix.san }}"
          CARGO_BUILD_TARGET: x86_64-unknown-linux-gnu
        run: |
          echo "Sanitizer ${{ matrix.san }} stub — wire real test invocation in STL follow-up."
          # Explicit +nightly: the repo's rust-toolchain.toml pins 1.89.0, and a
          # directory toolchain override outranks the nightly installed above.
          # Only a +toolchain arg beats the file — same trick the miri job uses.
          #
          # -Zbuild-std recompiles std/core with the same -Zsanitizer flag.
          # Without it, cargo links the precompiled rustup std (built with the
          # sanitizer unset) and rustc rejects the ABI mismatch. Needs the
          # rust-src component + an explicit --target, both already set above.
          #
          # `stele-exec-oracle` is excluded — its DuckDB C++ amalgamation has no
          # business being recompiled under -Zbuild-std/sanitizer; the Rust core
          # is what we sanitize, and the oracle runs in its own job below (STL-158).
          cargo +nightly build -Zbuild-std --workspace --exclude stele-exec-oracle --all-features

  miri:
    if: github.event_name == 'schedule' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    runs-on: arc-runner-fricker-amd64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags)
        with:
          toolchain: nightly
      - run: |
          # No-op until a runtime-`unsafe`-bearing crate exists for Miri to check
          # (today the workspace has none). `cargo miri test` interprets every
          # instruction, so pointing it at stele-common's vendored-crypto KATs —
          # an 80k-round PBKDF2 vector plus several 4096-round SCRAM derivations —
          # never finishes inside the job timeout, and with no `unsafe` to check
          # it would prove nothing anyway. Wire the real
          # `cargo +nightly miri test -p <crate>` (with `components: miri` and a
          # `cargo +nightly miri setup` step) here once that crate lands.
          echo "Miri stub — enable once unsafe-bearing crates exist."

  fuzz:
    if: github.event_name == 'schedule' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    runs-on: arc-runner-fricker-amd64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags)
        with:
          toolchain: nightly
      - run: |
          echo "Fuzz stub — add cargo-fuzz targets under fuzz/ then loop them here."

  simulation:
    if: github.event_name == 'schedule' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    runs-on: arc-runner-fricker-amd64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - run: cargo run -p stele-sim --release -- --seeds 100 --fault-injection on

  bench-gate:
    if: github.event_name == 'schedule' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    runs-on: arc-runner-fricker-amd64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - run: |
          echo "Bench gate stub — wire criterion baselines in STL follow-up."

  # The DuckDB differential oracle (STL-144), isolated here so the bundled DuckDB
  # C++ amalgamation never gates a PR (STL-158). This is the one job that compiles
  # `stele-exec-oracle`; the per-PR `ci.yml` jobs exclude it. Linux-only — the
  # oracle checks platform-independent bitemporal `AS OF` resolution, so there is
  # no value in paying the amalgamation compile on a second target. rust-cache
  # keeps the built libduckdb between runs (a real run is a no-op when the lock +
  # toolchain are unchanged).
  duckdb-oracle:
    if: github.event_name == 'schedule' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    name: duckdb differential oracle
    runs-on: arc-runner-fricker-amd64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags)
        with:
          toolchain: "1.89.0"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2.82.0
        with:
          tool: nextest
      - run: cargo nextest run -p stele-exec-oracle --all-features
