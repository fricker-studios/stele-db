# Enforces Conventional Commits on PR titles.
#
# Why this exists: `main` is squash-merge, so the PR title becomes the commit
# subject verbatim. The release pipeline (docs/04-cicd.md) derives the
# changelog from those subjects via `git-cliff`, which only recognises
# Conventional-Commit-shaped messages. A non-conforming title would silently
# vanish from the changelog and break the version-bump automation.
#
# Spec: docs/04-cicd.md ("Branch strategy" — Conventional Commits are
# required) and the project's CONTRIBUTING.md (authoritative list of types).
#
# Pinned by SHA per ADR-0005 (reproducible builds).
name: pr-title

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  conventional:
    name: conventional-commit title
    runs-on: arc-runner-fricker-amd64
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Keep this list in sync with CONTRIBUTING.md → "Conventional Commits".
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          # Scope is encouraged (`feat(storage): …`) but not required, so that
          # cross-cutting changes don't get forced into an artificial scope.
          requireScope: false
