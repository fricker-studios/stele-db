[package]
name        = "stele-cli"
description = "The `stele` CLI — interactive shell, one-shot queries, admin subcommands."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
homepage.workspace     = true
authors.workspace      = true

[lints]
workspace = true

[[bin]]
name = "stele"
path = "src/main.rs"

[dependencies]
stele-server = { workspace = true }
stele-common = { workspace = true }
anyhow       = { workspace = true }
clap         = { workspace = true }
tokio        = { workspace = true }

[dev-dependencies]
# The scripted-shell integration test boots an in-process engine + pgwire
# server on an ephemeral port, then drives the real `stele` binary against it.
stele-engine  = { workspace = true }
stele-pgwire  = { workspace = true }
stele-storage = { workspace = true }
tokio         = { workspace = true, features = ["rt-multi-thread", "macros"] }
