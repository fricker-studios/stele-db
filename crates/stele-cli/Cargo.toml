[package]
name        = "stele-cli"
description = "The `stele` CLI — interactive shell, one-shot queries, admin subcommands."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
homepage.workspace     = true
authors.workspace      = true

[lints]
workspace = true

[[bin]]
name = "stele"
path = "src/main.rs"

[dependencies]
stele-server = { workspace = true }
stele-common = { workspace = true }
# `stele restore` (STL-249) materializes a data dir from a backup and validates
# it through normal recovery — the engine's restore helper + `recover`, over a
# local disk. Both are already in the graph via stele-server, so this adds no new
# external dependency.
stele-engine  = { workspace = true }
stele-storage = { workspace = true }
anyhow       = { workspace = true }
clap         = { workspace = true }
tokio        = { workspace = true }
rustyline     = { workspace = true }
unicode-width = { workspace = true }
# `stele shell --tls` (STL-251): the same rustls the server stack uses, driven
# through its blocking `StreamOwned` adapter — still no async client crate.
rustls           = { workspace = true }
rustls-pki-types = { workspace = true }

[dev-dependencies]
# The scripted-shell integration test boots an in-process engine + pgwire
# server on an ephemeral port, then drives the real `stele` binary against it.
stele-pgwire  = { workspace = true }
tokio         = { workspace = true, features = ["rt-multi-thread", "macros"] }
# Self-signed certs for the TLS shell-session tests (STL-251).
rcgen         = { workspace = true }
