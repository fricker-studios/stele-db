# stele.example.toml — sample Stele engine configuration.
#
# Copy this to `stele.toml` and start the daemon against it:
#
#     stele-server --config stele.toml          # or: stele server --config stele.toml
#
# When `--config` is given, the file's values win and the server runs in
# NON-dev mode. Without it the server uses dev defaults — a `local` backend in a
# per-process scratch dir — and needs no config file at all (the "five-minute
# path"); config is for operators, not contributors. See
# docs/05-dev-environment.md#configuration.
#
# Only the keys flagged "(active)" are read today. Every other section here is
# RESERVED: the parser ignores unknown sections (it is forward-compatible), so
# they are shown commented out and do nothing yet — they land in later tickets.
# Logging is configured by environment variables, not this file (see the bottom).

[server]
# pg-wire listen address. (active) Default: "0.0.0.0:5454" — Stele's default
# Postgres-wire port (ADR-0017). A bare `--listen` flag is ignored when a config
# file is given; this key wins.
#
# Secure defaults (STL-251/STL-304, docs/10 §4): a non-dev server WITHOUT a
# [tls] section binds loopback as plaintext (a warning); on a non-loopback
# address it generates an EPHEMERAL self-signed cert so the listener is
# encrypted (warning loudly) rather than serving plaintext beyond the local
# machine — that cert is unauthenticated and regenerated each restart, so
# configure the [tls] section below with a CA-issued cert for production. (In a
# container the listener must be reachable through the port mapping: use
# "0.0.0.0:5454" plus [tls], or run the container with `--dev` instead.)
listen = "127.0.0.1:5454"

# Directory the `local` backend roots its data at (created if absent). (active)
# Ignored by the `memory` backend. Default: "/var/lib/stele".
data_dir = "/var/lib/stele"

# [tls]                          # TLS on pg-wire + the admin surface (active; STL-251/STL-311)
# Wire encryption via the standard Postgres SSLRequest negotiation: psql,
# psycopg, pgjdbc, and `stele shell --tls` all speak it natively
# (`sslmode=require` / `verify-full`). The SAME certificate also encrypts the
# admin / control-plane API (STL-311): the gRPC listener and the HTTPS
# `/v1alpha1` gateway on the ops listener — one cert, no separate admin config.
# Uncomment and point at PEM files:
#
# mode      = "required"         # "required" (default once [tls] is present):
#                                #   plaintext startups are refused (FATAL 28000)
#                                # "optional": TLS offered, plaintext accepted —
#                                #   the migration posture (warns at boot)
#                                # "disabled": section kept, TLS off
# cert      = "/etc/stele/server.crt"   # PEM certificate chain, leaf first
# key       = "/etc/stele/server.key"   # PEM private key (PKCS#8/PKCS#1/SEC1)
# client_ca = "/etc/stele/clients.crt"  # optional: require mTLS — every client
#                                       # must present a cert chaining to this CA
# Hot-reload (STL-293): after a rotator rewrites cert/key in place, send SIGHUP
# (`kill -HUP <pid>`) to swap the cert with NO restart — new connections get the
# new cert, in-flight sessions keep theirs; a bad pair keeps the old one serving.

# [auth]                         # pg-wire authentication (active; STL-252)
# SASL SCRAM-SHA-256 (RFC 7677), the standard Postgres password exchange:
# psql, psycopg, and pgjdbc all speak it natively. The server stores salted,
# iterated SCRAM *verifiers* in the durable catalog — never passwords — and
# they survive restarts. Without this section connections are unauthenticated
# ("trust" — the dev posture; a non-dev boot warns).
#
# Bootstrap the first user before enabling: boot once WITHOUT [auth] (trust
# over loopback, or behind [tls]), run
#     CREATE USER admin PASSWORD 'change-me';
# then uncomment the section and restart. Manage users over SQL afterwards:
# CREATE USER / ALTER USER <name> [WITH] PASSWORD '…' / DROP USER [IF EXISTS].
#
# mode = "scram"                 # "scram" (default once [auth] is present):
#                                #   every connection runs the SASL exchange;
#                                #   wrong password / unknown user → FATAL 28P01
#                                # "trust": no authentication — the bootstrap
#                                #   and dev posture

[storage]
# Which storage backend the engine boots on. (active) One of:
#   "local"  — durable, rooted at [server] data_dir (the default). What lands
#              in that directory and the durability discipline behind it
#              (file + directory fsync, torn-tail tolerance) are documented in
#              docs/02-architecture.md §3.7.
#   "memory" — ephemeral, in-process; nothing survives a restart (tests/throwaway)
# An object-store backend (e.g. "s3") is planned but not yet a valid value —
# setting it is a clear config error today.
backend = "local"

[telemetry]
# Ops HTTP listen address. (active) Serves Prometheus `/metrics` plus the
# `/healthz` (liveness) and `/readyz` (readiness: recovery complete and no
# WAL poisoned) probes on a port distinct from pg-wire (STL-253; the admin
# HTTP gateway will share this listener, ADR-0016). Default: "0.0.0.0:9090".
# See docs/11-operations-and-runbooks.md#1-health--monitoring for the scrape
# config and a first dashboard.
metrics = "0.0.0.0:9090"

# [admin]                         # admin / control-plane API (active; STL-254)
# The dedicated ops surface (ADR-0016): health, status, backup trigger,
# restore-plan validation, and segment/version/audit introspection — a gRPC
# service plus an HTTP/JSON gateway that shares the [telemetry] ops listener
# under /v1alpha1. SQL stays on pg-wire (existing Postgres drivers); this is
# ops-only. See docs/11-operations-and-runbooks.md#9-admin--control-plane-api.
#
# SECURE DEFAULT: with no `tokens` the API rejects every request and the gRPC
# listener is not bound — configuring a token is what turns the surface on.
# Tokens are static bearer secrets, sent as `Authorization: Bearer <token>`;
# they are never logged. They are only as safe as the channel: with the [tls]
# section above, BOTH admin transports serve over TLS (STL-311); without it, a
# non-loopback bind mints an ephemeral self-signed cert (encrypted, not
# authenticated — STL-304) and a loopback bind stays plaintext. Configure [tls]
# (or keep the surface on loopback) before exposing it off-box.
#
# tokens      = ["change-me-to-a-long-random-secret"]
# grpc_listen = "127.0.0.1:5455"  # default "0.0.0.0:5455"; only bound when a
#                                 # token is configured

