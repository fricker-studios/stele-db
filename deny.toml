# cargo-deny configuration — supply-chain gates run in CI.
# See https://embarkstudios.github.io/cargo-deny/.

[graph]
all-features = true

[advisories]
version = 2
ignore  = []
# `cargo deny check advisories` reads the RustSec database via cargo-audit.

[licenses]
version    = 2
confidence-threshold = 0.93
# Permissive licenses we are willing to depend on. Anything outside this set
# must be added with a written rationale — license drift is a supply-chain bug.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

# Stele itself ships under BUSL-1.1 ([ADR-0004]); we never pull in BUSL-licensed
# *dependencies*. To express that we only allow BUSL-1.1 on **our own** workspace
# crates — and still reject any third-party BUSL dep — we list each first-party
# crate by name as a license exception rather than adding BUSL-1.1 to the global
# `allow` list. Keep this in sync with the workspace members in /Cargo.toml.
exceptions = [
    { allow = ["BUSL-1.1"], name = "stele-common" },
    { allow = ["BUSL-1.1"], name = "stele-storage" },
    { allow = ["BUSL-1.1"], name = "stele-sim" },
    { allow = ["BUSL-1.1"], name = "stele-catalog" },
    { allow = ["BUSL-1.1"], name = "stele-txn" },
    { allow = ["BUSL-1.1"], name = "stele-sql" },
    { allow = ["BUSL-1.1"], name = "stele-exec" },
    { allow = ["BUSL-1.1"], name = "stele-engine" },
    { allow = ["BUSL-1.1"], name = "stele-pgwire" },
    { allow = ["BUSL-1.1"], name = "stele-lineage" },
    { allow = ["BUSL-1.1"], name = "stele-server" },
    { allow = ["BUSL-1.1"], name = "stele-cli" },
]

# --- duckdb dev-dependency decision (STL-144) -------------------------------
# The DuckDB differential bitemporal oracle ([docs/06 §10]) adds `duckdb`
# (`bundled`) as a **dev-dependency of `stele-exec` only** — never linked into a
# shipped crate, honoring the runtime-agnostic core boundary ([ADR-0010]).
#
# License: `duckdb` and `libduckdb-sys` (which vendors and compiles the DuckDB
# C++ amalgamation) are **MIT**; the dependency drags in the `arrow` stack and
# the usual num/zerocopy/chrono supporting crates, all **MIT** or **Apache-2.0**.
# `libduckdb-sys` also carries a `reqwest` (download-the-prebuilt-lib) **build**-
# dependency — compiled but unused on the `bundled` path, never linked into the
# test binary or any shipped crate. Every license across that subtree is already
# in the `allow` list above, so no new allowance was required — `cargo deny check
# licenses bans sources` is green with this addition, and `[sources]` keeps the
# whole graph on crates.io. `multiple-versions` stays a warning: the arrow tree
# pins a few crates at versions that differ from the workspace's, which is a
# dev-only duplication, not a shipped one.

[bans]
multiple-versions = "warn"
wildcards         = "deny"

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
